services:
  postgres:
    image: postgres:16-alpine
    container_name: lomicode-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lomicode_admin
      POSTGRES_USER: lomicode
      POSTGRES_PASSWORD: lomicode
    ports:
      - "5433:5432"   # optional: map to host if needed, but Hostinger may ignore
    volumes:
      - lomicode_pg:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lomicode -d lomicode_admin"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: lomicode-admin-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lomicode
      MINIO_ROOT_PASSWORD: lomicode-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - lomicode_minio:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: lomicode-admin-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 lomicode lomicode-secret >/dev/null 2>&1; do
        echo 'waiting for minio...'; sleep 2;
      done;
      /usr/bin/mc mb -p local/releases || true;
      echo 'minio bucket ready';
      "
    restart: "no"
    networks: [internal]

  app:
    build: .   # ← Hostinger will build from your Dockerfile
    container_name: lomicode-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      DATABASE_URL: postgresql://lomicode:lomicode@postgres:5432/lomicode_admin?schema=public
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: lomicode
      S3_SECRET_KEY: lomicode-secret
      S3_BUCKET: releases
      S3_FORCE_PATH_STYLE: "true"
      SUBSCRIPTION_GRACE_DAYS: ${SUBSCRIPTION_GRACE_DAYS:-7}
      SEED_VENDOR_EMAIL: ${SEED_VENDOR_EMAIL:-admin@lomicode.local}
      SEED_VENDOR_PASSWORD: ${SEED_VENDOR_PASSWORD:-ChangeMe!2026}
      SEED_VENDOR_NAME: ${SEED_VENDOR_NAME:-LomiCode Admin}
    volumes:
      - lomicode_secrets:/app/.secrets
    networks: [internal, web]
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: lomicode-caddy
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-:80}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
    networks: [web, internal]

volumes:
  lomicode_pg:
  lomicode_minio:
  lomicode_secrets:
  caddy_data:
  caddy_config:

networks:
  internal:
    internal: false
  web:
    external: true