name: Build & publish Docker image

# Triggers:
#   - every push to main
#   - manually from the Actions tab
#
# The image lands at:
#   ghcr.io/howsy/lomicode-vendor-admin:latest
#   ghcr.io/howsy/lomicode-vendor-admin:<short-sha>     (pinned-version friendly)
#
# After the first run, go to:
#   https://github.com/users/howsy/packages/container/lomicode-vendor-admin/settings
# and set "Package visibility" to Public so Hostinger can pull without auth.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # allows pushing to ghcr.io under the same owner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Owner names on ghcr.io are case-sensitive — must be lowercase. The
      # repo is `howsy/LomiCode-Vendor` (mixed case); the image we publish
      # uses an explicitly-lowercased owner+name.
      - name: Compute lowercase image name
        id: img
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/$OWNER/lomicode-vendor-admin" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Two tags on every build: a pinned commit SHA (for rollbacks)
          # and `latest` (Hostinger's compose pulls this).
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          # GitHub-hosted runners use a layered cache that survives across
          # workflow runs — first build ~5 min, subsequent builds ~1 min.
          cache-from: type=gha
          cache-to: type=gha,mode=max
